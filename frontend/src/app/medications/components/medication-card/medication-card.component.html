<div
  class="med-card"
  [class.taken]="medication.taken_today"
  [style.--med-color]="medication.color"
  [style.--med-color-soft]="hexAlpha(medication.color, 0.15)"
  (click)="onToggle($event)">

  <div class="med-icon" [style.background]="hexAlpha(medication.color, 0.15)">
    {{ medication.icon }}
  </div>

  <div class="med-info">
    <div class="med-name">{{ medication.name }}</div>
    <div class="med-detail">
      {{ medication.dosage }}
      <span *ngIf="medication.dosage"> · </span>
      {{ freqLabels[medication.frequency] }}
    </div>
    <div class="med-time" *ngIf="medication.reminder_time">
      ⏰ {{ medication.reminder_time.slice(0, 5) }}
    </div>
    <div class="taken-badge" *ngIf="medication.taken_today">✓ Tomado hoje</div>
  </div>

  <div class="med-actions" *ngIf="showActions; else checkboxTpl">
    <button class="btn-sm" (click)="onEdit($event)">✏️</button>
    <button class="btn-sm danger" (click)="onDelete($event)">🗑️</button>
  </div>

  <ng-template #checkboxTpl>
    <div class="med-checkbox" (click)="onToggle($event)">
      <span class="check-icon">✓</span>
    </div>
  </ng-template>
</div>

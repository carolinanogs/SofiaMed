<div class="sheet-overlay" [class.open]="isOpen" (click)="cancel()"></div>

<div class="sheet" [class.open]="isOpen" [formGroup]="form">
  <div class="sheet-handle"></div>
  <h2 class="sheet-title">{{ title }}</h2>

  <div class="form-group">
    <label class="form-label">Nome do remédio *</label>
    <input class="form-input" formControlName="name" type="text" placeholder="Ex: Anticoncepcional" />
    <span class="form-error" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
      Nome é obrigatório
    </span>
  </div>

  <div class="form-group">
    <label class="form-label">Dosagem</label>
    <input class="form-input" formControlName="dosage" type="text" placeholder="Ex: 1 comprimido" />
  </div>

  <div class="form-group">
    <label class="form-label">Frequência</label>
    <select class="form-input" formControlName="frequency">
      <option value="daily">Diário</option>
      <option value="weekly">Semanal</option>
      <option value="when_needed">Quando necessário</option>
    </select>
  </div>

  <div class="form-group">
    <label class="form-label">Horário de lembrete</label>
    <input class="form-input" formControlName="reminder_time" type="time" />
  </div>

  <div class="form-group">
    <label class="form-label">Observações</label>
    <input class="form-input" formControlName="description" type="text" placeholder="Ex: Tomar com água" />
  </div>

  <div class="form-group">
    <label class="form-label">Cor</label>
    <div class="color-picker">
      <div
        *ngFor="let c of colors"
        class="color-swatch"
        [style.background]="c"
        [class.selected]="currentColor === c"
        (click)="selectColor(c)">
      </div>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Ícone</label>
    <div class="icon-picker">
      <button
        *ngFor="let ic of icons"
        type="button"
        class="icon-btn"
        [class.selected]="currentIcon === ic"
        (click)="selectIcon(ic)">
        {{ ic }}
      </button>
    </div>
  </div>

  <button class="btn-primary" type="button" [disabled]="saving" (click)="submit()">
    {{ saving ? 'Salvando...' : 'Salvar remédio' }}
  </button>
  <button class="btn-ghost" type="button" (click)="cancel()">Cancelar</button>
</div>

<div class="page-wrapper">
  <header class="header">
    <div class="logo">Histórico</div>
    <div class="header-sub">Seus registros</div>
  </header>

  <main class="content">
    <div *ngIf="loading">
      <div class="skeleton-group" *ngFor="let i of [1,2]">
        <div class="skeleton-date"></div>
        <div class="skeleton-item" *ngFor="let j of [1,2]"></div>
      </div>
    </div>

    <ng-container *ngIf="!loading">
      <div *ngIf="groupedLogs.length === 0" class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Nenhum registro ainda</div>
        <p class="empty-text">Marque seus remédios como tomados para ver o histórico aqui.</p>
      </div>

      <div class="log-group" *ngFor="let group of groupedLogs">
        <div class="group-date">{{ group.date }}</div>
        <div class="log-item" *ngFor="let log of group.logs" [class.taken]="log.taken">
          <div class="log-dot" [class.taken]="log.taken"></div>
          <div class="log-info">
            <div class="log-status">{{ log.taken ? '✅ Tomado' : '⭕ Não tomado' }}</div>
            <div class="log-time">{{ formatTime(log.taken_at) }}</div>
            <div class="log-notes" *ngIf="log.notes">{{ log.notes }}</div>
          </div>
        </div>
      </div>
    </ng-container>
  </main>

  <app-bottom-nav></app-bottom-nav>
</div>

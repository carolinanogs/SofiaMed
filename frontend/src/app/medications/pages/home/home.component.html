<div class="page-wrapper">
  <header class="header">
    <div class="header-row">
      <div>
        <div class="logo">Sofia<span class="accent">Med</span></div>
        <div class="header-sub">Olá, Sofia 🌸</div>
      </div>
      <button class="btn-icon" (click)="loadData()" title="Atualizar">↻</button>
    </div>
  </header>

  <main class="content">

    <div class="summary-card" *ngIf="summary; else loadingCard">
      <div class="summary-date">{{ summary.date }}</div>
      <div class="summary-greeting">{{ greeting }}</div>
      <div class="summary-progress">
        <div class="progress-bar">
          <div class="progress-fill" [style.width.%]="progressPercent"></div>
        </div>
        <div class="progress-text">{{ summary.taken }}/{{ summary.total }} tomados</div>
      </div>
    </div>

    <ng-template #loadingCard>
      <div class="skeleton-card"></div>
    </ng-template>

    <div class="section-label">Meus Remédios — Hoje</div>

    <div *ngIf="loading" class="loading-list">
      <div class="skeleton-item" *ngFor="let i of [1,2,3]"></div>
    </div>

    <ng-container *ngIf="!loading">
      <app-medication-card
        *ngFor="let med of medications"
        [medication]="med"
        (toggled)="onToggle($event)">
      </app-medication-card>

      <div class="empty-state" *ngIf="medications.length === 0">
        <div class="empty-icon">🌸</div>
        <div class="empty-title">Nenhum remédio cadastrado</div>
        <p class="empty-text">Toque no <strong>+</strong> para adicionar seu primeiro remédio.</p>
      </div>
    </ng-container>
  </main>

  <button class="fab" (click)="openForm()">+</button>
  <app-bottom-nav></app-bottom-nav>
</div>

<app-medication-form
  [isOpen]="showForm"
  [medication]="editingMedication"
  (saved)="onSaved($event)"
  (cancelled)="onCancelled()">
</app-medication-form>
